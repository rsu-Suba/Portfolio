<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"/>
<title>Donut in World</title>
<link rel="stylesheet" href="videostyle.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" />
</head>
<body>
    <video src="./Original/lv_0_20210625065938.mp4" poster="./Thumbnail/lv_0_20210625065938.jpg" id="blurred" loop></video>
<div class="container show-controls">
    <div class="wrapper">
        <div class="video-timeline">
            <div class="progress-area">
                <span>00:00</span>
                <div class="progress-bar"></div>
            </div>
        </div>
        <ul class="video-controls">
            <li class="options left">
                <button class="volume"><i class="fa-solid fa-volume-high"><span class="material-symbols-rounded">volume_up</span></i></button>
                <input type="range" min="0" max="1" step="any">
                <div class="video-timer">
                    <p class="current-time">00:00</p>
                    <p class="separator"> / </p>
                    <p class="video-duration">00:00</p>
                </div>
            </li>
            <li class="options center">
                <button class="skip-backward"><i class="fas fa-backward"><span class="material-symbols-outlined">skip_previous</span></i></button>
                <button class="play-pause"><i class="fas fa-play"><span class="material-symbols-outlined">play_circle</span></i></button>
                <button class="skip-forward"><i class="fas fa-forward"><span class="material-symbols-outlined">skip_next</span></i></button>
            </li>
            <li class="options right">
                <div class="playback-content">
                    <button class="playback-speed"><span class="material-symbols-rounded">slow_motion_video</span></button>
                    <ul class="speed-options">
                        <li data-speed="2">2x</li>
                        <li data-speed="1.5">1.5x</li>
                        <li data-speed="1" class="active">Normal</li>
                        <li data-speed="0.75">0.75x</li>
                        <li data-speed="0.5">0.5x</li>
                    </ul>
                </div>
                <button class="fullscreen"><i class="fa-solid fa-expand"><span class="material-symbols-outlined">fullscreen</span></i></button>
            </li>
        </ul>
    </div>
    <video src="./Original/lv_0_20210625065938.mp4" poster="./Thumbnail/lv_0_20210625065938.jpg" loop></video>
</div>
<script src="script.js"></script>
</body>
